<script>

const amountInput=document.getElementById("amount");
const vatInput=document.getElementById("vatRate");
const countrySelect=document.getElementById("country");
const modeSelect=document.getElementById("mode");
const resultBox=document.getElementById("result");

function formatCurrency(value){
return new Intl.NumberFormat('en',{style:'currency',currency:'EUR'}).format(value);
}

function calculate(){

const amount=parseFloat(amountInput.value);
const vat=parseFloat(vatInput.value);
const mode=modeSelect.value;

if(isNaN(amount)||isNaN(vat)) return;

let net,vatAmount,total;

if(mode==="add"){

net=amount;
vatAmount=amount*(vat/100);
total=net+vatAmount;

}else{

net=amount/(1+vat/100);
vatAmount=amount-net;
total=amount;

}

resultBox.innerHTML=
`Net price: ${formatCurrency(net)}<br>
VAT amount: ${formatCurrency(vatAmount)}<br>
Total price: ${formatCurrency(total)}`;

}

countrySelect.addEventListener("change",()=>{
vatInput.value=countrySelect.value;
calculate();
});

amountInput.addEventListener("input",calculate);
modeSelect.addEventListener("change",calculate);

function copyResult(){
navigator.clipboard.writeText(resultBox.innerText);
alert("Result copied");
}

function sharePage(){

if(navigator.share){

navigator.share({
title:"EU VAT Calculator",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link copied");

}

}

</script>
